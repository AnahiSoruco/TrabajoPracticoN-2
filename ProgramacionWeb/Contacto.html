  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/Style-contacto.css">
</head>

<body>

 <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">
  <div class="container">
     <a class="navbar-brand fw-bold" href="index.html">Turismo Jujuy</a>
     
     <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="index.html"><i class="fas fa-home"></i> Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="destinos.html"><i class="fas fa-map-marker-alt"></i> Destinos</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="agencias.html"><i class="fas fa-layer-group"></i> Agencias</a>

        </li>
      </ul>
    </div>
  </div>
</nav>


<!-- FORMULARIO -->
 <section class="contacto d-flex justify-content-center align-items-center vh-100">
  
  <form id="formulario" class="form-pro text-center">
    
    <h2>Contáctanos</h2>
    
    <div class="input-group mb-3">
      <label for="nombre" class="form-label w-100 text-start">Nombre</label>
      <input type="text" id="nombre" class="form-control" required>
    </div>
    
    <div class="input-group mb-3">
      <label for="email" class="form-label w-100 text-start">Email</label>
      <input type="email" id="email" class="form-control" required>
    </div>
    
    <div class="input-group mb-3">
      <textarea id="mensaje" class="form-control" required></textarea>
      <label for="mensaje" class="form-label">Mensaje</label>
    </div>
    
    <button type="submit" class="btn btn-info w-100">Enviar</button>

    <!-- SPINNER BOOTSTRAP -->
     <div class="spinner-border text-light d-none mt-3" id="spinner" role="status"></div>
    
    </form>
  
  </section>

<!-- MODAL -->
 <div class="modal fade" id="modalBootstrap" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content text-center">
      <div class="modal-body">
        <p>Mensaje enviado correctamente ✔</p>
        <button class="btn btn-primary" data-bs-dismiss="modal">Cerrar</button>
      </div>
    </div>
  </div>
</div>

<!-- SCRIPTS -->
 <script src="js/jquery.min.js"></script>
 <script src="js/bootstrap.bundle.min.js"></script>
 
 <script>
  
  const form = document.getElementById("formulario");

  // VALIDACION EN TIEMPO REAL
  $("#formulario input, #formulario textarea").on("input", function() {
    if ($(this).val().trim() === "") {
      $(this).css("border-bottom", "2px solid red");
    } else {
      $(this).css("border-bottom", "2px solid #00ffae");
    }
  });

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    $("#spinner").removeClass("d-none");

    setTimeout(() => {
      $("#spinner").addClass("d-none");

      let modal = new bootstrap.Modal(document.getElementById('modalBootstrap'));
      modal.show();

    }, 2000);
  });
</script>

</body>
</html>
